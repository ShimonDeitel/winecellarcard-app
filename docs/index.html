<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Wine Cellar Card</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body { margin:0; background:#5B1A2E; color:#fff; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; text-align:center; }
  .wrap { max-width:560px; padding:40px 24px; }
  h1 { font-size:2.4rem; margin-bottom:8px; }
  p.tag { font-size:1.1rem; opacity:.85; margin-bottom:28px; }
  a.btn { display:inline-block; padding:12px 28px; border-radius:10px; background:#D4AF6A; color:#111; font-weight:600; text-decoration:none; }
  footer { margin-top:40px; font-size:.85rem; opacity:.6; }
  footer a { color:#D4AF6A; }

  @keyframes floatOrb {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(30px,-40px) scale(1.08); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to { opacity:1; transform: translateY(0); }
  }
  .orb {
    position: fixed; top: -120px; right: -120px; width: 420px; height: 420px;
    background: radial-gradient(circle, #4FB0AE55 0%, #4FB0AE00 70%);
    filter: blur(10px); pointer-events: none; z-index: 0;
    animation: floatOrb 9s ease-in-out infinite;
  }
  .wrap { position: relative; z-index: 1; }
  h1 { animation: fadeUp 0.8s ease-out both; }
  p.tagline { animation: fadeUp 0.8s ease-out 0.15s both; }
  .feature { animation: fadeUp 0.8s ease-out both; transition: transform 0.25s ease; }
  .feature:nth-of-type(1) { animation-delay: 0.3s; }
  .feature:nth-of-type(2) { animation-delay: 0.45s; }
  .feature:hover { transform: translateY(-3px); }
  footer { animation: fadeUp 0.8s ease-out 0.6s both; }
</style>
</head>
<body>
<div class="orb"></div>
<div class="wrap">
  <h1>Wine Cellar Card</h1>
  <p class="tag">Catalog your wine bottles by vintage, region, and ideal drink-by window.</p>
  <a class="btn" href="#">Coming soon to the App Store</a>
  <footer>
    <p><a href="privacy.html">Privacy Policy</a> &middot; <a href="terms.html">Terms of Use</a></p>
    <p>Contact: s0533495227@gmail.com</p>
  </footer>
</div>
</body>
</html>
