name: WineCellarCard
options:
  bundleIdPrefix: com.shimondeitel.winecellarcard
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  WineCellarCard:
    type: application
    platform: iOS
    sources:
      - path: WineCellarCard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.winecellarcard
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: WineCellarCard/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  WineCellarCardTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: WineCellarCardTests
      - path: WineCellarCard.storekit
    dependencies:
      - target: WineCellarCard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.winecellarcard.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  WineCellarCardUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: WineCellarCardUITests
    dependencies:
      - target: WineCellarCard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.winecellarcard.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  WineCellarCard:
    build:
      targets:
        WineCellarCard: all
        WineCellarCardTests: [test]
        WineCellarCardUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: WineCellarCard.storekit
    test:
      config: Debug
      storeKitConfiguration: WineCellarCard.storekit
      targets:
        - WineCellarCardTests
        - WineCellarCardUITests
    archive:
      config: Release
